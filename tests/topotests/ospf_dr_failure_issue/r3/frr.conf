frr defaults traditional
hostname r3
service integrated-vtysh-config
!
interface lo
 ip address 3.3.3.3/32
 ip ospf area 0
!
interface eth1
 ip address 10.0.0.3/24
 ip ospf area 0
 ip ospf network broadcast
 ip ospf hello-interval 1
 ip ospf dead-interval 4
 ip ospf priority 100
!
router ospf
 ospf router-id 3.3.3.3
 timers throttle spf 0 0 0
 timers lsa min-arrival 0
!
debug ospf event
debug ospf nsm
debug ospf packet hello
debug ospf lsa
debug ospf packet ls-req
debug ospf packet ls-upd
debug ospf packet ls-ack
debug ospf lsa flooding
debug ospf zebra redistribute
log file ospfd.log debugging
end
line vty
